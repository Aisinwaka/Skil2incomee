[build]
  command = "bash -lc 'npm ci --prefix frontend && npm run build --prefix frontend'"
  publish = "frontend/.next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18.17.0"

[dev]
  command = "npm run dev --prefix frontend"
  port = 3000

[[redirects]]
  from = "/api/*"
  to = "https://your-backend-url/api/:splat"
  status = 200
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/_next/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[context.production.environment]
  NEXT_PUBLIC_API_URL = "https://your-production-backend-url"
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NEXT_PUBLIC_API_URL = "https://your-staging-backend-url"
  NODE_ENV = "production"

[context.branch-deploy.environment]
  NEXT_PUBLIC_API_URL = "https://your-staging-backend-url"
  NODE_ENV = "production"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true

[build.processing.js]
  bundle = true

[build.processing.html]
  pretty_print = false
